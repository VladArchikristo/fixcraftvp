<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgMain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A2B4A;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#112038;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:1" />
    </linearGradient>
    <!-- Right side atmospheric glow -->
    <radialGradient id="nightGlow" cx="75%" cy="60%" r="45%">
      <stop offset="0%" style="stop-color:#1E3A6E;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:0" />
    </radialGradient>
    <!-- Road gradient -->
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2B4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1220;stop-opacity:1" />
    </linearGradient>
    <!-- Headlight beam gradient -->
    <linearGradient id="beamGrad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#FFD166;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#FFD166;stop-opacity:0" />
    </linearGradient>
    <!-- Truck body gradient -->
    <linearGradient id="truckBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8D8EC;stop-opacity:1" />
    </linearGradient>
    <!-- Golden accent gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFD166;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="headlightBlur" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="textShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1024" height="500" fill="url(#bgMain)"/>
  <rect x="0" y="0" width="1024" height="500" fill="url(#nightGlow)"/>

  <!-- Stars -->
  <g opacity="0.6">
    <circle cx="620" cy="30" r="1.5" fill="#FFFFFF"/>
    <circle cx="680" cy="55" r="1" fill="#FFFFFF"/>
    <circle cx="750" cy="20" r="2" fill="#FFFFFF"/>
    <circle cx="810" cy="45" r="1.5" fill="#FFFFFF"/>
    <circle cx="870" cy="15" r="1" fill="#FFFFFF"/>
    <circle cx="920" cy="60" r="1.5" fill="#FFFFFF"/>
    <circle cx="970" cy="30" r="1" fill="#FFFFFF"/>
    <circle cx="640" cy="80" r="1" fill="#FFFFFF"/>
    <circle cx="720" cy="95" r="1.5" fill="#FFFFFF"/>
    <circle cx="790" cy="70" r="1" fill="#FFFFFF"/>
    <circle cx="850" cy="88" r="2" fill="#FFFFFF"/>
    <circle cx="900" cy="100" r="1" fill="#FFFFFF"/>
    <circle cx="950" cy="78" r="1.5" fill="#FFFFFF"/>
    <circle cx="660" cy="120" r="1" fill="#FFFFFF"/>
    <circle cx="740" cy="110" r="1.5" fill="#FFFFFF"/>
  </g>

  <!-- City skyline silhouette (right background) -->
  <g opacity="0.12" fill="#4A6FA5">
    <rect x="650" y="160" width="30" height="120"/>
    <rect x="685" y="140" width="25" height="140"/>
    <rect x="715" y="170" width="35" height="110"/>
    <rect x="755" y="130" width="28" height="150"/>
    <rect x="788" y="155" width="22" height="125"/>
    <rect x="815" y="120" width="32" height="160"/>
    <rect x="852" y="145" width="26" height="135"/>
    <rect x="883" y="165" width="20" height="115"/>
    <rect x="908" y="135" width="30" height="145"/>
    <rect x="943" y="150" width="25" height="130"/>
    <rect x="973" y="140" width="28" height="140"/>
    <!-- Building windows -->
    <rect x="653" y="170" width="5" height="5" fill="#FFD166" opacity="0.6"/>
    <rect x="662" y="170" width="5" height="5" fill="#FFD166" opacity="0.6"/>
    <rect x="653" y="183" width="5" height="5" fill="#FFD166" opacity="0.4"/>
    <rect x="758" y="143" width="5" height="5" fill="#FFD166" opacity="0.5"/>
    <rect x="770" y="143" width="5" height="5" fill="#FFD166" opacity="0.7"/>
    <rect x="818" y="133" width="5" height="5" fill="#FFD166" opacity="0.6"/>
    <rect x="830" y="133" width="5" height="5" fill="#FFD166" opacity="0.4"/>
    <rect x="911" y="145" width="5" height="5" fill="#FFD166" opacity="0.5"/>
    <rect x="923" y="145" width="5" height="5" fill="#FFD166" opacity="0.7"/>
  </g>

  <!-- Road perspective -->
  <polygon points="300,500 724,500 900,280 124,280" fill="url(#roadGrad)"/>

  <!-- Road edge lines -->
  <line x1="124" y1="280" x2="300" y2="500" stroke="#F5A623" stroke-width="2.5" opacity="0.5"/>
  <line x1="900" y1="280" x2="724" y2="500" stroke="#F5A623" stroke-width="2.5" opacity="0.5"/>

  <!-- Road center dashes -->
  <g fill="#F5A623" opacity="0.7">
    <rect x="493" y="290" width="38" height="9" rx="4.5"/>
    <rect x="480" y="315" width="44" height="10" rx="5"/>
    <rect x="464" y="343" width="52" height="11" rx="5.5"/>
    <rect x="445" y="375" width="60" height="12" rx="6"/>
    <rect x="422" y="412" width="72" height="13" rx="6.5"/>
    <rect x="393" y="453" width="86" height="14" rx="7"/>
  </g>

  <!-- Headlight beam glow on road -->
  <ellipse cx="760" cy="380" rx="180" ry="60" fill="#FFD166" opacity="0.08" filter="url(#softGlow)"/>
  <polygon points="780,310 820,310 1024,420 1024,460 780,340" fill="url(#beamGrad)" opacity="0.15"/>

  <!-- ===== TRUCK (right side) ===== -->
  <g transform="translate(750, 300)">

    <!-- Truck shadow on road -->
    <ellipse cx="30" cy="100" rx="200" ry="20" fill="#000000" opacity="0.3"/>

    <!-- Trailer -->
    <rect x="-220" y="-115" width="185" height="125" rx="6" fill="url(#truckBody)"/>
    <!-- Trailer panel lines -->
    <line x1="-185" y1="-115" x2="-185" y2="10" stroke="#A0B4C8" stroke-width="1.5" opacity="0.4"/>
    <line x1="-150" y1="-115" x2="-150" y2="10" stroke="#A0B4C8" stroke-width="1.5" opacity="0.4"/>
    <line x1="-115" y1="-115" x2="-115" y2="10" stroke="#A0B4C8" stroke-width="1.5" opacity="0.4"/>
    <line x1="-80" y1="-115" x2="-80" y2="10" stroke="#A0B4C8" stroke-width="1.5" opacity="0.4"/>
    <!-- Trailer logo area -->
    <rect x="-190" y="-95" width="130" height="55" rx="4" fill="#1A2B4A" opacity="0.15"/>

    <!-- Cab connector -->
    <rect x="-40" y="-20" width="12" height="30" rx="3" fill="#B0C4DE"/>

    <!-- Cab -->
    <rect x="-30" y="-145" width="195" height="155" rx="10" fill="url(#truckBody)"/>

    <!-- Cab roof / sleeper -->
    <rect x="-30" y="-145" width="125" height="55" rx="8" fill="#E8F0FA"/>
    <!-- Air deflector on top -->
    <path d="M -30,-145 Q 60,-175 95,-145" fill="#D0DCF0" stroke="#B0C4DE" stroke-width="1"/>

    <!-- Windshield -->
    <rect x="60" y="-130" width="92" height="72" rx="6" fill="#0D1B2A" opacity="0.85"/>
    <!-- Windshield glare reflection -->
    <line x1="68" y1="-122" x2="100" y2="-62" stroke="#FFFFFF" stroke-width="2.5" opacity="0.2"/>
    <line x1="82" y1="-122" x2="110" y2="-68" stroke="#FFFFFF" stroke-width="1.5" opacity="0.12"/>

    <!-- Side window -->
    <rect x="-18" y="-128" width="65" height="48" rx="4" fill="#0D1B2A" opacity="0.75"/>

    <!-- Door handle -->
    <rect x="22" y="-92" width="16" height="5" rx="2.5" fill="#F5A623"/>

    <!-- Door line -->
    <line x1="47" y1="-145" x2="47" y2="10" stroke="#A0B4C8" stroke-width="1.5" opacity="0.5"/>

    <!-- Exhaust stacks -->
    <rect x="-12" y="-215" width="10" height="75" rx="5" fill="#C0D0E0"/>
    <rect x="2" y="-205" width="10" height="65" rx="5" fill="#B0C4DE"/>
    <!-- Exhaust smoke puffs -->
    <circle cx="-7" cy="-225" r="10" fill="#FFFFFF" opacity="0.08"/>
    <circle cx="0" cy="-240" r="7" fill="#FFFFFF" opacity="0.05"/>
    <circle cx="7" cy="-215" r="8" fill="#FFFFFF" opacity="0.07"/>

    <!-- Headlights (glowing) -->
    <rect x="160" y="-95" width="18" height="26" rx="3" fill="#FFD166" filter="url(#glow)"/>
    <rect x="160" y="-95" width="18" height="26" rx="3" fill="#F5A623" opacity="0.6"/>
    <!-- Headlight lens detail -->
    <line x1="164" y1="-90" x2="174" y2="-75" stroke="#FFFFFF" stroke-width="1" opacity="0.4"/>

    <!-- Grille -->
    <rect x="154" y="-63" width="20" height="36" rx="2" fill="#A0B4C8"/>
    <line x1="154" y1="-56" x2="174" y2="-56" stroke="#7090A8" stroke-width="1.5"/>
    <line x1="154" y1="-48" x2="174" y2="-48" stroke="#7090A8" stroke-width="1.5"/>
    <line x1="154" y1="-40" x2="174" y2="-40" stroke="#7090A8" stroke-width="1.5"/>
    <line x1="154" y1="-32" x2="174" y2="-32" stroke="#7090A8" stroke-width="1.5"/>

    <!-- Bumper -->
    <rect x="148" y="-28" width="30" height="14" rx="4" fill="#C0D0E0"/>

    <!-- Under-carriage bar -->
    <rect x="-220" y="10" width="380" height="18" rx="4" fill="#8090A8"/>

    <!-- Front fog lights -->
    <rect x="152" y="-22" width="10" height="6" rx="2" fill="#FFD166" opacity="0.7"/>

    <!-- Rear wheels (pair) -->
    <circle cx="-160" cy="44" r="36" fill="#1A2B4A"/>
    <circle cx="-160" cy="44" r="31" fill="#243650"/>
    <circle cx="-160" cy="44" r="21" fill="#1A2B4A"/>
    <circle cx="-160" cy="44" r="12" fill="#F5A623"/>
    <circle cx="-160" cy="44" r="5" fill="#FFFFFF"/>
    <line x1="-160" y1="23" x2="-160" y2="65" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="-139" y1="44" x2="-181" y2="44" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="-145" y1="29" x2="-175" y2="59" stroke="#F5A623" stroke-width="2"/>
    <line x1="-145" y1="59" x2="-175" y2="29" stroke="#F5A623" stroke-width="2"/>

    <circle cx="-100" cy="44" r="36" fill="#1A2B4A"/>
    <circle cx="-100" cy="44" r="31" fill="#243650"/>
    <circle cx="-100" cy="44" r="21" fill="#1A2B4A"/>
    <circle cx="-100" cy="44" r="12" fill="#F5A623"/>
    <circle cx="-100" cy="44" r="5" fill="#FFFFFF"/>
    <line x1="-100" y1="23" x2="-100" y2="65" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="-79" y1="44" x2="-121" y2="44" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="-85" y1="29" x2="-115" y2="59" stroke="#F5A623" stroke-width="2"/>
    <line x1="-85" y1="59" x2="-115" y2="29" stroke="#F5A623" stroke-width="2"/>

    <!-- Front wheel -->
    <circle cx="115" cy="44" r="38" fill="#1A2B4A"/>
    <circle cx="115" cy="44" r="33" fill="#243650"/>
    <circle cx="115" cy="44" r="22" fill="#1A2B4A"/>
    <circle cx="115" cy="44" r="13" fill="#F5A623"/>
    <circle cx="115" cy="44" r="6" fill="#FFFFFF"/>
    <line x1="115" y1="22" x2="115" y2="66" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="93" y1="44" x2="137" y2="44" stroke="#F5A623" stroke-width="2.5"/>
    <line x1="100" y1="28" x2="130" y2="60" stroke="#F5A623" stroke-width="2"/>
    <line x1="100" y1="60" x2="130" y2="28" stroke="#F5A623" stroke-width="2"/>

    <!-- Cab steps -->
    <rect x="136" y="4" width="28" height="8" rx="2" fill="#A0B4C8"/>
    <rect x="136" y="14" width="24" height="7" rx="2" fill="#90A4B8"/>

  </g>
  <!-- ===== END TRUCK ===== -->

  <!-- ===== LEFT SIDE: TEXT CONTENT ===== -->

  <!-- App name -->
  <text x="64" y="150" font-family="Arial Black, Arial" font-weight="900" font-size="88"
        fill="#FFFFFF" filter="url(#textShadow)" letter-spacing="-2">HaulWallet</text>

  <!-- Tagline -->
  <text x="66" y="200" font-family="Arial, sans-serif" font-weight="300" font-size="28"
        fill="#8AACCC" letter-spacing="1">Your Co-Pilot for Every Mile</text>

  <!-- Separator line (gold) -->
  <rect x="64" y="222" width="320" height="3" rx="1.5" fill="url(#goldGrad)"/>

  <!-- Feature pills row -->
  <g transform="translate(64, 255)">

    <!-- Feature 1: Route Tracking -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="152" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.07"
            stroke="#F5A623" stroke-width="1.5" stroke-opacity="0.6"/>
      <!-- Pin icon -->
      <circle cx="28" cy="24" r="10" fill="#F5A623" opacity="0.2"/>
      <text x="28" y="30" font-family="Arial" font-size="16" fill="#F5A623" text-anchor="middle">📍</text>
      <text x="90" y="20" font-family="Arial Black, Arial" font-weight="700" font-size="13"
            fill="#FFFFFF">Route</text>
      <text x="90" y="35" font-family="Arial, sans-serif" font-size="11"
            fill="#8AACCC">Tracking</text>
    </g>

    <!-- Feature 2: Earnings -->
    <g transform="translate(162, 0)">
      <rect x="0" y="0" width="152" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.07"
            stroke="#F5A623" stroke-width="1.5" stroke-opacity="0.6"/>
      <circle cx="28" cy="24" r="10" fill="#F5A623" opacity="0.2"/>
      <text x="28" y="30" font-family="Arial" font-size="16" fill="#F5A623" text-anchor="middle">💰</text>
      <text x="90" y="20" font-family="Arial Black, Arial" font-weight="700" font-size="13"
            fill="#FFFFFF">Earnings</text>
      <text x="90" y="35" font-family="Arial, sans-serif" font-size="11"
            fill="#8AACCC">Dashboard</text>
    </g>

    <!-- Feature 3: Load Manager -->
    <g transform="translate(324, 0)">
      <rect x="0" y="0" width="152" height="48" rx="24" fill="#FFFFFF" fill-opacity="0.07"
            stroke="#F5A623" stroke-width="1.5" stroke-opacity="0.6"/>
      <circle cx="28" cy="24" r="10" fill="#F5A623" opacity="0.2"/>
      <text x="28" y="30" font-family="Arial" font-size="16" fill="#F5A623" text-anchor="middle">📦</text>
      <text x="90" y="20" font-family="Arial Black, Arial" font-weight="700" font-size="13"
            fill="#FFFFFF">Load</text>
      <text x="90" y="35" font-family="Arial, sans-serif" font-size="11"
            fill="#8AACCC">Manager</text>
    </g>

  </g>

  <!-- Bottom stats bar -->
  <rect x="0" y="430" width="1024" height="70" fill="#0A1628" opacity="0.6"/>

  <!-- Stats -->
  <g transform="translate(64, 465)">
    <text x="0" y="0" font-family="Arial Black, Arial" font-weight="900" font-size="22"
          fill="#F5A623">50K+</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#8AACCC">Active Drivers</text>
  </g>
  <line x1="175" y1="440" x2="175" y2="490" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
  <g transform="translate(190, 465)">
    <text x="0" y="0" font-family="Arial Black, Arial" font-weight="900" font-size="22"
          fill="#F5A623">4.8★</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#8AACCC">App Rating</text>
  </g>
  <line x1="300" y1="440" x2="300" y2="490" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
  <g transform="translate(315, 465)">
    <text x="0" y="0" font-family="Arial Black, Arial" font-weight="900" font-size="22"
          fill="#F5A623">2M+</text>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="12" fill="#8AACCC">Miles Tracked</text>
  </g>

  <!-- Bottom right: CTA badge -->
  <g transform="translate(860, 442)">
    <rect x="0" y="0" width="130" height="48" rx="24" fill="url(#goldGrad)"/>
    <text x="65" y="22" font-family="Arial Black, Arial" font-weight="900" font-size="13"
          fill="#1A2B4A" text-anchor="middle">FREE DOWNLOAD</text>
    <text x="65" y="38" font-family="Arial, sans-serif" font-size="11"
          fill="#1A2B4A" text-anchor="middle" opacity="0.8">iOS &amp; Android</text>
  </g>

  <!-- Subtle vignette at edges -->
  <defs>
    <radialGradient id="vignette" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.35" />
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="500" fill="url(#vignette)" pointer-events="none"/>

</svg>
