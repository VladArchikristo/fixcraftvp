  <text x="170" y="1552" font-size="26" text-anchor="middle" fill="#FFFFFF" font-weight="500">Add Load</text>

  <rect x="300" y="1464" width="220" height="110" rx="20" fill="#132235"/>
  <text x="410" y="1516" font-size="32" text-anchor="middle" fill="#FCD34D">📸</text>
  <text x="410" y="1552" font-size="26" text-anchor="middle" fill="#FFFFFF" font-weight="500">Scan BOL</text>

  <rect x="540" y="1464" width="220" height="110" rx="20" fill="#132235"/>
  <text x="650" y="1516" font-size="32" text-anchor="middle" fill="#34D399">⏱️</text>
  <text x="650" y="1552" font-size="26" text-anchor="middle" fill="#FFFFFF" font-weight="500">Log Hours</text>

  <rect x="780" y="1464" width="240" height="110" rx="20" fill="#132235"/>
  <text x="900" y="1516" font-size="32" text-anchor="middle" fill="#F87171">🔧</text>
  <text x="900" y="1552" font-size="26" text-anchor="middle" fill="#FFFFFF" font-weight="500">Maintenance</text>

