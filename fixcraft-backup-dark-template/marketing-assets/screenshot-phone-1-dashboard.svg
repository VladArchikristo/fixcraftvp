  <text x="930" y="1020" font-size="26" fill="#4CAF50" text-anchor="end" font-weight="600">+$380</text>
  <text x="930" y="1056" font-size="24" fill="#8BA3BC" text-anchor="end">Today, 6:12 AM</text>

  <!-- Activity Item 2 -->
  <rect x="60" y="1110" width="960" height="120" rx="20" fill="#0F1E30"/>
  <circle cx="120" cy="1170" r="30" fill="#F59E0B" opacity="0.2"/>
  <text x="120" y="1180" font-size="26" text-anchor="middle" fill="#FCD34D">⛽</text>
  <text x="180" y="1156" font-size="30" fill="#FFFFFF" font-weight="600">Fuel Stop — Pilot J #4482</text>
  <text x="180" y="1192" font-size="26" fill="#8BA3BC">I-85 N Exit 48, Gastonia, NC</text>
  <text x="930" y="1156" font-size="26" fill="#EF4444" text-anchor="end" font-weight="600">-$124</text>
  <text x="930" y="1192" font-size="24" fill="#8BA3BC" text-anchor="end">Yesterday, 11:45 PM</text>

  <!-- Activity Item 3 -->
  <rect x="60" y="1246" width="960" height="120" rx="20" fill="#0F1E30"/>
  <circle cx="120" cy="1306" r="30" fill="#10B981" opacity="0.2"/>
  <text x="120" y="1316" font-size="26" text-anchor="middle" fill="#34D399">📍</text>
  <text x="180" y="1292" font-size="30" fill="#FFFFFF" font-weight="600">Load #HW-2846 Picked Up</text>
  <text x="180" y="1328" font-size="26" fill="#8BA3BC">Charlotte, NC → Atlanta, GA</text>
  <text x="930" y="1292" font-size="26" fill="#8BA3BC" text-anchor="end" font-weight="600">In Progress</text>
  <text x="930" y="1328" font-size="24" fill="#8BA3BC" text-anchor="end">Yesterday, 8:30 AM</text>

