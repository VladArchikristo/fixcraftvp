  <text x="60" y="950" font-size="32" fill="#8BA3BC" font-weight="500" letter-spacing="2">RECENT ACTIVITY</text>

  <!-- Activity Item 1 -->
  <rect x="60" y="974" width="960" height="120" rx="20" fill="#0F1E30"/>
  <circle cx="120" cy="1034" r="30" fill="#1565C0" opacity="0.3"/>
