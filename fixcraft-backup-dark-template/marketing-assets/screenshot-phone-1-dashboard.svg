  <line x1="0" y1="1700" x2="1080" y2="1700" stroke="#1A3A5C" stroke-width="1.5"/>

  <!-- Nav Items -->
  <!-- Home (active) -->
  <rect x="64" y="1720" width="168" height="100" rx="20" fill="#1565C0" opacity="0.2"/>
  <text x="148" y="1768" font-size="36" text-anchor="middle" fill="#2196F3">🏠</text>
  <text x="148" y="1800" font-size="26" text-anchor="middle" fill="#2196F3" font-weight="600">Home</text>

  <!-- Loads -->
  <text x="364" y="1768" font-size="36" text-anchor="middle" fill="#8BA3BC">📦</text>
  <text x="364" y="1800" font-size="26" text-anchor="middle" fill="#8BA3BC">Loads</text>

  <!-- Map (center FAB) -->
  <circle cx="540" cy="1660" r="58" fill="#1565C0" filter="url(#shadow)"/>
  <circle cx="540" cy="1660" r="48" fill="#1565C0"/>
  <text x="540" y="1678" font-size="40" text-anchor="middle" fill="#FFFFFF">🗺️</text>

  <!-- Earnings -->
  <text x="716" y="1768" font-size="36" text-anchor="middle" fill="#8BA3BC">💵</text>
  <text x="716" y="1800" font-size="26" text-anchor="middle" fill="#8BA3BC">Earnings</text>

  <!-- Profile -->
  <text x="932" y="1768" font-size="36" text-anchor="middle" fill="#8BA3BC">👤</text>
  <text x="932" y="1800" font-size="26" text-anchor="middle" fill="#8BA3BC">Profile</text>

  <!-- Home indicator bar -->
