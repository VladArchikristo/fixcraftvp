  <text x="140" y="502" font-size="30" text-anchor="middle" fill="#60A5FA">📦</text>
  <text x="100" y="556" font-size="58" fill="#FFFFFF" font-weight="800">3</text>
  <text x="100" y="594" font-size="28" fill="#8BA3BC" font-weight="400">Active Loads</text>
  <rect x="100" y="608" width="80" height="6" rx="3" fill="#1565C0" opacity="0.6"/>

  <!-- Card 2: This Week -->
  <rect x="390" y="424" width="300" height="200" rx="24" fill="url(#cardGrad2)" filter="url(#shadow)"/>
  <rect x="390" y="424" width="300" height="200" rx="24" fill="none" stroke="#1E4A6E" stroke-width="1.5"/>
  <circle cx="470" cy="490" r="36" fill="#F59E0B" opacity="0.2"/>
  <text x="470" y="502" font-size="30" text-anchor="middle" fill="#FCD34D">💰</text>
  <text x="400" y="556" font-size="46" fill="#F59E0B" font-weight="800">$1,240</text>
  <text x="400" y="594" font-size="28" fill="#8BA3BC" font-weight="400">This Week</text>
  <text x="400" y="614" font-size="22" fill="#4CAF50">▲ +8.2%</text>

