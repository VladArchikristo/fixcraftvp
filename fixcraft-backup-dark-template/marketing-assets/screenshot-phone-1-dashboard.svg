<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A3A5C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F2640;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E4A6E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#123050;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earningsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="screenClip">
      <rect x="0" y="0" width="1080" height="1920" rx="0" ry="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>

  <!-- Status bar -->
  <rect width="1080" height="100" fill="#0A1520"/>
  <text x="80" y="68" font-size="32" fill="#FFFFFF" font-weight="600">9:41</text>
  <!-- Battery icon -->
  <rect x="940" y="38" width="66" height="30" rx="6" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <rect x="1006" y="46" width="6" height="14" rx="2" fill="#FFFFFF"/>
  <rect x="944" y="42" width="48" height="22" rx="4" fill="#4CAF50"/>
  <!-- Signal bars -->
  <rect x="860" y="52" width="8" height="16" rx="2" fill="#FFFFFF"/>
  <rect x="874" y="46" width="8" height="22" rx="2" fill="#FFFFFF"/>
  <rect x="888" y="40" width="8" height="28" rx="2" fill="#FFFFFF"/>
  <!-- WiFi -->
  <path d="M816 60 Q824 52 836 52 Q848 52 856 60" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M822 68 Q830 60 836 60 Q842 60 850 68" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <circle cx="836" cy="74" r="5" fill="#FFFFFF"/>

  <!-- Header section -->
  <rect x="0" y="100" width="1080" height="240" fill="#0D1B2A"/>

  <!-- Avatar circle -->
  <circle cx="90" cy="215" r="48" fill="#1565C0"/>
  <text x="90" y="228" font-size="36" fill="#FFFFFF" text-anchor="middle" font-weight="700">V</text>

  <!-- Greeting text -->
  <text x="162" y="200" font-size="28" fill="#8BA3BC" font-weight="400">Friday, April 17</text>
  <text x="162" y="244" font-size="44" fill="#FFFFFF" font-weight="700">Good morning, Vladimir</text>

  <!-- Truck emoji area -->
  <text x="820" y="244" font-size="56" fill="#F59E0B">🚛</text>

  <!-- Notification bell -->
  <rect x="960" y="160" width="68" height="68" rx="20" fill="#132235"/>
  <path d="M994 178 Q994 172 1000 170 Q1006 172 1006 178 L1006 186 Q1010 190 1010 196 L990 196 Q990 190 994 186 Z" fill="#8BA3BC"/>
  <path d="M997 196 Q997 200 1000 200 Q1003 200 1003 196" fill="#8BA3BC"/>
  <circle cx="1008" cy="174" r="7" fill="#EF4444"/>

  <!-- Divider -->
  <line x1="60" y1="340" x2="1020" y2="340" stroke="#1A3A5C" stroke-width="2"/>

