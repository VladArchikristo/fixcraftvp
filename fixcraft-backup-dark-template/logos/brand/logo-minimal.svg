<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 80" width="280" height="80">
  <!-- Clean white background -->
  <rect width="280" height="80" fill="white"/>

  <!-- Simple geometric tool: wrench outline -->
  <g transform="translate(10, 10)">
    <circle cx="30" cy="15" r="13" fill="none" stroke="#1E40AF" stroke-width="4"/>
    <circle cx="30" cy="15" r="5" fill="#1E40AF"/>
    <rect x="26" y="25" width="8" height="28" rx="2" fill="#1E40AF"/>
    <!-- Handle grip -->
    <line x1="24" y1="42" x2="38" y2="42" stroke="#F97316" stroke-width="3"/>
    <line x1="24" y1="48" x2="38" y2="48" stroke="#F97316" stroke-width="3"/>
  </g>

  <!-- FIXCRAFT minimal -->
  <text x="68" y="36" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="700" font-size="28" fill="#1E40AF" letter-spacing="1">FIX<tspan fill="#F97316">CRAFT</tspan></text>

  <!-- Thin line -->
  <line x1="68" y1="44" x2="265" y2="44" stroke="#E2E8F0" stroke-width="1"/>

  <!-- Minimal tagline -->
  <text x="68" y="62" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" fill="#94A3B8" letter-spacing="3" font-weight="400">HANDYMAN SERVICES</text>
</svg>
