<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 80" width="340" height="80">
  <!-- Orange diagonal accent block -->
  <polygon points="0,0 50,0 30,80 0,80" fill="#F97316" opacity="0.15"/>
  <polygon points="0,0 38,0 18,80 0,80" fill="#F97316" opacity="0.2"/>

  <!-- Hammer icon -->
  <g transform="translate(8, 12)">
    <!-- Hammer head -->
    <rect x="14" y="0" width="30" height="18" rx="3" fill="#1E40AF"/>
    <!-- Hammer handle -->
    <rect x="20" y="15" width="8" height="42" rx="4" fill="#1E3A8A" transform="rotate(0, 24, 35)"/>
    <!-- Nail -->
    <line x1="44" y1="9" x2="58" y2="9" stroke="#F97316" stroke-width="4" stroke-linecap="round"/>
    <polygon points="56,6 62,9 56,12" fill="#F97316"/>
  </g>

  <!-- FIXCRAFT main text -->
  <text x="80" y="34" font-family="Impact, Arial Black, sans-serif" font-size="30" font-weight="900" fill="#1E40AF" letter-spacing="1">FIX</text>
  <text x="120" y="34" font-family="Impact, Arial Black, sans-serif" font-size="30" font-weight="900" fill="#F97316" letter-spacing="1">CRAFT</text>

  <!-- Horizontal lines decoration -->
  <rect x="80" y="38" width="210" height="3" fill="#1E40AF" rx="1.5"/>
  <rect x="80" y="43" width="210" height="1" fill="#F97316" rx="0.5"/>

  <!-- Tagline -->
  <text x="80" y="60" font-family="Arial, sans-serif" font-size="11" fill="#374151" letter-spacing="4" font-weight="700">HANDYMAN SERVICES</text>

  <!-- Location -->
  <text x="80" y="73" font-family="Arial, sans-serif" font-size="10" fill="#F97316" letter-spacing="1">📍 Charlotte, NC · (980) 201-6705</text>
</svg>
