<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 500" width="1024" height="500">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="mainBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2B4A;stop-opacity:1"/>
      <stop offset="60%" style="stop-color:#122038;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0D1829;stop-opacity:1"/>
    </linearGradient>

    <!-- Orange gradient -->
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C55;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:1"/>
    </linearGradient>

    <!-- Road perspective gradient -->
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0.2"/>
    </linearGradient>

    <!-- Horizon glow -->
    <radialGradient id="horizonGlow" cx="50%" cy="72%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.18"/>
      <stop offset="60%" style="stop-color:#FF6B35;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </radialGradient>

    <!-- Text glow -->
    <filter id="textGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#FFFFFF" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Orange text glow -->
    <filter id="orangeTextGlow" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#FF6B35" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Icon glow filter -->
    <filter id="iconGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#FF6B35" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>

    <!-- Star shape -->
    <symbol id="star4" viewBox="-5 -5 10 10">
      <polygon points="0,-4 1,-1 4,0 1,1 0,4 -1,1 -4,0 -1,-1" fill="white"/>
    </symbol>
  </defs>

  <!-- ====== BACKGROUND ====== -->
  <rect x="0" y="0" width="1024" height="500" fill="url(#mainBg)"/>

  <!-- Horizon atmospheric glow -->
  <rect x="0" y="0" width="1024" height="500" fill="url(#horizonGlow)"/>

  <!-- ====== STARS ====== -->
  <g fill="white">
    <circle cx="45" cy="32" r="2.5" opacity="0.8"/>
    <circle cx="102" cy="18" r="1.5" opacity="0.6"/>
    <circle cx="78" cy="55" r="1" opacity="0.5"/>
    <circle cx="155" cy="28" r="2" opacity="0.7"/>
    <circle cx="210" cy="45" r="1.5" opacity="0.5"/>
    <circle cx="290" cy="22" r="1" opacity="0.6"/>
    <circle cx="350" cy="38" r="1.5" opacity="0.4"/>
    <circle cx="430" cy="15" r="2" opacity="0.7"/>
    <circle cx="500" cy="40" r="1" opacity="0.5"/>
    <circle cx="620" cy="25" r="2" opacity="0.6"/>
    <circle cx="680" cy="48" r="1.5" opacity="0.5"/>
    <circle cx="745" cy="18" r="1" opacity="0.7"/>
    <circle cx="810" cy="35" r="2.5" opacity="0.8"/>
    <circle cx="870" cy="22" r="1.5" opacity="0.5"/>
    <circle cx="930" cy="42" r="1" opacity="0.6"/>
    <circle cx="985" cy="28" r="2" opacity="0.7"/>
    <circle cx="960" cy="60" r="1.5" opacity="0.4"/>
    <use href="#star4" transform="translate(65,22) scale(0.8)" opacity="0.7"/>
    <use href="#star4" transform="translate(480,28) scale(0.8)" opacity="0.6"/>
    <use href="#star4" transform="translate(900,18) scale(0.8)" opacity="0.7"/>
    <use href="#star4" transform="translate(750,50) scale(0.6)" opacity="0.5"/>
  </g>

  <!-- ====== ROAD PERSPECTIVE (center) ====== -->
  <path d="M 412 360 L 612 360 L 780 500 L 244 500 Z" fill="#0A1520" opacity="0.8"/>
  <path d="M 412 360 L 612 360 L 780 500 L 244 500 Z" fill="url(#roadGrad)"/>

  <!-- Road edge lines -->
  <line x1="412" y1="360" x2="244" y2="500" stroke="#FF6B35" stroke-width="2" stroke-opacity="0.4"/>
  <line x1="612" y1="360" x2="780" y2="500" stroke="#FF6B35" stroke-width="2" stroke-opacity="0.4"/>

  <!-- Center dashes perspective -->
  <g fill="#FF8C55" opacity="0.5">
    <rect x="505" y="366" width="14" height="8" rx="2"/>
    <rect x="496" y="384" width="32" height="9" rx="2"/>
    <rect x="482" y="405" width="58" height="10" rx="2"/>
    <rect x="460" y="430" width="100" height="12" rx="2"/>
    <rect x="430" y="460" width="162" height="14" rx="2"/>
  </g>

  <!-- Road glow at horizon -->
  <ellipse cx="512" cy="362" rx="140" ry="12" fill="#FF6B35" opacity="0.15"/>

  <!-- Horizon line -->
  <line x1="0" y1="360" x2="1024" y2="360" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Landscape silhouette -->
  <path d="M 0 360 L 80 300 L 150 330 L 220 270 L 310 310 L 380 280 L 412 360 Z"
        fill="#0D1829" opacity="0.7"/>
  <path d="M 612 360 L 660 290 L 720 310 L 780 265 L 860 305 L 920 280 L 1024 340 L 1024 360 Z"
        fill="#0D1829" opacity="0.7"/>

  <!-- ====== TRUCK SILHOUETTE (left side) ====== -->
  <g filter="url(#shadow)" transform="translate(55, 270)">
    <rect x="60" y="0" width="140" height="72" rx="3" fill="#E8ECF5" opacity="0.9"/>
    <rect x="60" y="0" width="140" height="14" rx="3" fill="url(#orange)" opacity="0.9"/>
    <line x1="130" y1="14" x2="130" y2="72" stroke="#CCCCCC" stroke-width="1.5"/>
    <line x1="60" y1="43" x2="200" y2="43" stroke="#CCCCCC" stroke-width="1"/>
    <rect x="8" y="18" width="56" height="54" rx="2" fill="#F0F4FF" opacity="0.95"/>
    <path d="M 8 18 Q 10 2 32 0 L 64 0 L 64 18 Z" fill="#F0F4FF" opacity="0.95"/>
    <path d="M 14 18 Q 16 6 32 3 L 58 3 L 58 18 Z" fill="#1A2B4A" opacity="0.75"/>
    <path d="M 16 17 Q 18 8 32 5 L 50 5 L 50 17 Z" fill="#FFFFFF" opacity="0.1"/>
    <rect x="2" y="38" width="8" height="16" rx="2" fill="url(#orange)"/>
    <path d="M 2 42 L -30 34 L -30 50 L 2 50 Z" fill="url(#orange)" opacity="0.12"/>
    <rect x="8" y="72" width="192" height="8" rx="2" fill="#D0D4E0" opacity="0.8"/>
    <circle cx="35" cy="87" r="17" fill="#2A3A5A"/>
    <circle cx="35" cy="87" r="11" fill="#1A2B4A"/>
    <circle cx="35" cy="87" r="5" fill="url(#orange)"/>
    <circle cx="148" cy="87" r="17" fill="#2A3A5A"/>
    <circle cx="148" cy="87" r="11" fill="#1A2B4A"/>
    <circle cx="148" cy="87" r="5" fill="url(#orange)"/>
    <circle cx="178" cy="87" r="17" fill="#2A3A5A"/>
    <circle cx="178" cy="87" r="11" fill="#1A2B4A"/>
    <circle cx="178" cy="87" r="5" fill="url(#orange)"/>
    <rect x="57" y="-14" width="5" height="20" rx="2.5" fill="#AAAAAA" opacity="0.7"/>
    <circle cx="59" cy="-18" r="5" fill="#FFFFFF" opacity="0.12"/>
    <circle cx="62" cy="-26" r="4" fill="#FFFFFF" opacity="0.07"/>
  </g>

  <!-- ====== MAIN TITLE ====== -->
  <text x="512" y="175"
        text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-size="96"
        font-weight="900"
        letter-spacing="-2"
        fill="white"
        filter="url(#textGlow)">HAUL</text>

  <text x="512" y="270"
        text-anchor="middle"
        font-family="'Arial Black', 'Impact', 'Helvetica Neue', sans-serif"
        font-size="96"
        font-weight="900"
        letter-spacing="-2"
        fill="url(#orange)"
        filter="url(#orangeTextGlow)">WALLET</text>

  <!-- Separator line under title -->
  <rect x="392" y="286" width="240" height="3" rx="1.5" fill="url(#orange)" opacity="0.6"/>

  <!-- ====== TAGLINE ====== -->
  <text x="512" y="320"
        text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-size="20"
        font-weight="400"
        letter-spacing="4"
        fill="white"
        opacity="0.75">YOUR CO-PILOT FOR EVERY MILE</text>

  <!-- ====== FEATURE ICONS (bottom row) ====== -->

  <!-- Icon 1: Truck -->
  <g transform="translate(280, 385)" filter="url(#iconGlow)">
    <circle cx="0" cy="0" r="32" fill="#FF6B35" opacity="0.12"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.4"/>
    <g transform="translate(-16, -10)" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="8" y="6" width="18" height="12" rx="1.5"/>
      <path d="M 8 12 L 3 12 L 1 17 L 3 18 L 26 18"/>
      <circle cx="6" cy="18" r="3" fill="white" stroke="none"/>
      <circle cx="21" cy="18" r="3" fill="white" stroke="none"/>
    </g>
    <text x="0" y="50" text-anchor="middle"
          font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.7" letter-spacing="1">TRACKING</text>
  </g>

  <!-- Icon 2: GPS Pin -->
  <g transform="translate(420, 385)" filter="url(#iconGlow)">
    <circle cx="0" cy="0" r="32" fill="#FF6B35" opacity="0.12"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.4"/>
    <g transform="translate(-9, -14)" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
      <path d="M 9 2 C 4 2 1 6 1 10 C 1 16 9 22 9 22 C 9 22 17 16 17 10 C 17 6 14 2 9 2 Z"/>
      <circle cx="9" cy="10" r="3.5" fill="#FF6B35" stroke="none"/>
    </g>
    <text x="0" y="50" text-anchor="middle"
          font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.7" letter-spacing="1">ROUTES</text>
  </g>

  <!-- Icon 3: Dollar -->
  <g transform="translate(560, 385)" filter="url(#iconGlow)">
    <circle cx="0" cy="0" r="32" fill="#FF6B35" opacity="0.12"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.4"/>
    <text x="0" y="9" text-anchor="middle"
          font-family="'Arial Black', Georgia, serif"
          font-size="36" font-weight="900"
          fill="url(#orange)">$</text>
    <text x="0" y="50" text-anchor="middle"
          font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.7" letter-spacing="1">EARNINGS</text>
  </g>

  <!-- Icon 4: Chart/Stats -->
  <g transform="translate(700, 385)" filter="url(#iconGlow)">
    <circle cx="0" cy="0" r="32" fill="#FF6B35" opacity="0.12"/>
    <circle cx="0" cy="0" r="28" fill="none" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.4"/>
    <g transform="translate(-14, -12)">
      <rect x="2" y="14" width="6" height="10" rx="1" fill="white" opacity="0.8"/>
      <rect x="10" y="8" width="6" height="16" rx="1" fill="url(#orange)"/>
      <rect x="18" y="4" width="6" height="20" rx="1" fill="white" opacity="0.6"/>
      <line x1="0" y1="24" x2="26" y2="24" stroke="white" stroke-width="1.5" opacity="0.5"/>
    </g>
    <text x="0" y="50" text-anchor="middle"
          font-family="Arial, sans-serif" font-size="11" fill="white" opacity="0.7" letter-spacing="1">ANALYTICS</text>
  </g>

  <!-- ====== DECORATIVE ELEMENTS ====== -->

  <!-- Left accent lines -->
  <g stroke="#FF6B35" stroke-opacity="0.18" stroke-width="1">
    <line x1="0" y1="130" x2="160" y2="130"/>
    <line x1="0" y1="145" x2="120" y2="145"/>
    <line x1="0" y1="160" x2="80" y2="160"/>
  </g>

  <!-- Right accent lines -->
  <g stroke="#FF6B35" stroke-opacity="0.18" stroke-width="1">
    <line x1="1024" y1="130" x2="864" y2="130"/>
    <line x1="1024" y1="145" x2="904" y2="145"/>
    <line x1="1024" y1="160" x2="944" y2="160"/>
  </g>

  <!-- Orange corner accents -->
  <g fill="none" stroke="url(#orange)" stroke-width="2" stroke-opacity="0.3">
    <path d="M 0 80 L 0 0 L 80 0"/>
    <path d="M 1024 80 L 1024 0 L 944 0"/>
    <path d="M 0 420 L 0 500 L 80 500"/>
    <path d="M 1024 420 L 1024 500 L 944 500"/>
  </g>

  <!-- Subtle dot pattern top-right -->
  <g fill="white" opacity="0.06">
    <circle cx="820" cy="80" r="3"/>
    <circle cx="840" cy="80" r="3"/>
    <circle cx="860" cy="80" r="3"/>
    <circle cx="880" cy="80" r="3"/>
    <circle cx="900" cy="80" r="3"/>
    <circle cx="820" cy="100" r="3"/>
    <circle cx="840" cy="100" r="3"/>
    <circle cx="860" cy="100" r="3"/>
    <circle cx="880" cy="100" r="3"/>
    <circle cx="900" cy="100" r="3"/>
    <circle cx="820" cy="120" r="3"/>
    <circle cx="840" cy="120" r="3"/>
    <circle cx="860" cy="120" r="3"/>
    <circle cx="880" cy="120" r="3"/>
    <circle cx="900" cy="120" r="3"/>
  </g>

  <!-- Top center orange line accent -->
  <rect x="452" y="0" width="120" height="3" rx="1.5" fill="url(#orange)" opacity="0.6"/>

  <!-- Store badge hint -->
  <g transform="translate(880, 430)">
    <rect x="-70" y="-18" width="140" height="36" rx="18" fill="url(#orange)" opacity="0.15"/>
    <rect x="-70" y="-18" width="140" height="36" rx="18" fill="none" stroke="url(#orange)" stroke-width="1" stroke-opacity="0.4"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="Arial, sans-serif" font-size="13" font-weight="600"
          fill="white" opacity="0.85" letter-spacing="1">AVAILABLE NOW</text>
  </g>

  <!-- Outer border -->
  <rect x="2" y="2" width="1020" height="496"
        fill="none" stroke="white" stroke-width="1" stroke-opacity="0.05"/>
</svg>
