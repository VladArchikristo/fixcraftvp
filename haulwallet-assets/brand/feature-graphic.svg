<svg width="1024" height="500" viewBox="0 0 1024 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1D35"/>
      <stop offset="60%" style="stop-color:#1A2B4A"/>
      <stop offset="100%" style="stop-color:#0D2240"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B2B"/>
      <stop offset="100%" style="stop-color:#FF8C5A"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#243557"/>
      <stop offset="100%" style="stop-color:#1A2B4A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="100" x2="1024" y2="100" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="200" x2="1024" y2="200" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="300" x2="1024" y2="300" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="0" y1="400" x2="1024" y2="400" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="200" y1="0" x2="200" y2="500" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="400" y1="0" x2="400" y2="500" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="600" y1="0" x2="600" y2="500" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>
  <line x1="800" y1="0" x2="800" y2="500" stroke="#FFFFFF" stroke-width="0.3" opacity="0.06"/>

  <!-- Road at bottom -->
  <rect x="0" y="430" width="1024" height="70" fill="#0A1525"/>
  <rect x="0" y="430" width="1024" height="4" fill="#FF6B2B" opacity="0.6"/>
  <!-- Road dashes -->
  <rect x="80" y="460" width="70" height="6" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <rect x="240" y="460" width="70" height="6" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <rect x="400" y="460" width="70" height="6" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <rect x="560" y="460" width="70" height="6" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <rect x="720" y="460" width="70" height="6" rx="3" fill="#FFFFFF" opacity="0.2"/>
  <rect x="880" y="460" width="70" height="6" rx="3" fill="#FFFFFF" opacity="0.2"/>

  <!-- Truck silhouette -->
  <g transform="translate(620, 320)" opacity="0.9" filter="url(#shadow2)">
    <!-- Trailer -->
    <rect x="0" y="0" width="220" height="90" rx="8" fill="#1E3055"/>
    <rect x="0" y="0" width="220" height="90" rx="8" fill="none" stroke="#FF6B2B" stroke-width="2" opacity="0.5"/>
    <line x1="110" y1="0" x2="110" y2="90" stroke="#FF6B2B" stroke-width="1.5" opacity="0.4"/>
    <!-- Cab -->
    <rect x="220" y="15" width="130" height="75" rx="10" fill="#253D62"/>
    <rect x="228" y="22" width="96" height="38" rx="6" fill="#0F1D35" opacity="0.8"/>
    <!-- Headlight -->
    <rect x="346" y="45" width="14" height="22" rx="4" fill="#FFD166"/>
    <!-- Wheels -->
    <circle cx="50" cy="96" r="22" fill="#0A1525"/>
    <circle cx="50" cy="96" r="12" fill="#1A2B4A"/>
    <circle cx="50" cy="96" r="5" fill="#FF6B2B"/>
    <circle cx="155" cy="96" r="22" fill="#0A1525"/>
    <circle cx="155" cy="96" r="12" fill="#1A2B4A"/>
    <circle cx="155" cy="96" r="5" fill="#FF6B2B"/>
    <circle cx="290" cy="96" r="22" fill="#0A1525"/>
    <circle cx="290" cy="96" r="12" fill="#1A2B4A"/>
    <circle cx="290" cy="96" r="5" fill="#FF6B2B"/>
  </g>

  <!-- Speed lines -->
  <line x1="580" y1="350" x2="610" y2="350" stroke="#FF6B2B" stroke-width="2" opacity="0.5"/>
  <line x1="560" y1="365" x2="605" y2="365" stroke="#FF6B2B" stroke-width="1.5" opacity="0.35"/>
  <line x1="570" y1="380" x2="608" y2="380" stroke="#FF6B2B" stroke-width="1" opacity="0.25"/>

  <!-- LEFT SIDE: App UI Cards -->
  <!-- Earnings card -->
  <rect x="50" y="60" width="280" height="130" rx="16" fill="url(#cardGrad)" filter="url(#shadow2)"/>
  <rect x="50" y="60" width="280" height="130" rx="16" fill="none" stroke="#FF6B2B" stroke-width="1" opacity="0.4"/>
  <text x="75" y="95" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC">THIS WEEK</text>
  <text x="75" y="135" font-family="Arial, sans-serif" font-size="38" font-weight="bold" fill="#FFFFFF">$2,847</text>
  <text x="75" y="162" font-family="Arial, sans-serif" font-size="12" fill="#4CAF50">▲ +12.4% vs last week</text>
  <circle cx="295" cy="110" r="22" fill="#FF6B2B" opacity="0.15"/>
  <text x="295" y="117" font-family="Arial, sans-serif" font-size="20" fill="#FF6B2B" text-anchor="middle">💰</text>

  <!-- Active load card -->
  <rect x="50" y="210" width="280" height="110" rx="16" fill="url(#cardGrad)" filter="url(#shadow2)"/>
  <rect x="50" y="210" width="280" height="110" rx="16" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3"/>
  <text x="75" y="240" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC">ACTIVE LOAD</text>
  <text x="75" y="270" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#FFFFFF">Charlotte → Houston</text>
  <text x="75" y="293" font-family="Arial, sans-serif" font-size="12" fill="#60A5FA">● En route  •  487 mi remaining</text>
  <rect x="75" y="304" width="200" height="6" rx="3" fill="#1A2B4A"/>
  <rect x="75" y="304" width="120" height="6" rx="3" fill="#FF6B2B"/>

  <!-- Trip log card -->
  <rect x="50" y="340" width="280" height="90" rx="16" fill="url(#cardGrad)" filter="url(#shadow2)"/>
  <text x="75" y="368" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC">LAST TRIP</text>
  <text x="75" y="394" font-family="Arial, sans-serif" font-size="15" font-weight="bold" fill="#FFFFFF">Memphis → Atlanta</text>
  <text x="75" y="414" font-family="Arial, sans-serif" font-size="12" fill="#8FA8CC">382 mi  •  $640  •  Apr 16</text>

  <!-- CENTER: App name and tagline -->
  <text x="512" y="110" font-family="Arial Black, Arial, sans-serif" font-size="62" font-weight="900" fill="#FFFFFF" text-anchor="middle" filter="url(#glow)">HaulWallet</text>
  <rect x="362" y="124" width="300" height="3" rx="1.5" fill="url(#orange)"/>
  <text x="512" y="160" font-family="Arial, sans-serif" font-size="18" fill="#8FA8CC" text-anchor="middle">Your co-pilot for every mile on the road</text>

  <!-- Feature pills -->
  <rect x="372" y="185" width="148" height="32" rx="16" fill="#FF6B2B" opacity="0.15"/>
  <rect x="372" y="185" width="148" height="32" rx="16" fill="none" stroke="#FF6B2B" stroke-width="1" opacity="0.6"/>
  <text x="446" y="205" font-family="Arial, sans-serif" font-size="13" fill="#FF6B2B" text-anchor="middle">🚛 Load Tracking</text>

  <rect x="532" y="185" width="128" height="32" rx="16" fill="#3B82F6" opacity="0.1"/>
  <rect x="532" y="185" width="128" height="32" rx="16" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.4"/>
  <text x="596" y="205" font-family="Arial, sans-serif" font-size="13" fill="#60A5FA" text-anchor="middle">📍 GPS Routes</text>

  <rect x="372" y="228" width="138" height="32" rx="16" fill="#4CAF50" opacity="0.1"/>
  <rect x="372" y="228" width="138" height="32" rx="16" fill="none" stroke="#4CAF50" stroke-width="1" opacity="0.4"/>
  <text x="441" y="248" font-family="Arial, sans-serif" font-size="13" fill="#4CAF50" text-anchor="middle">💵 Earnings Log</text>

  <rect x="522" y="228" width="138" height="32" rx="16" fill="#8B5CF6" opacity="0.1"/>
  <rect x="522" y="228" width="138" height="32" rx="16" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.4"/>
  <text x="591" y="248" font-family="Arial, sans-serif" font-size="13" fill="#A78BFA" text-anchor="middle">🔐 Secure Login</text>
</svg>
