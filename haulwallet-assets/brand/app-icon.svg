<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2B4A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0F1D35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B2B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E85A1A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="walletGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#D0DCF0;stop-opacity:0.95" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="roundedRect">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Subtle road lines at bottom -->
  <rect x="0" y="400" width="512" height="112" rx="0" fill="#0D1828" opacity="0.5" clip-path="url(#roundedRect)"/>
  <rect x="60" y="430" width="90" height="8" rx="4" fill="#FF6B2B" opacity="0.3"/>
  <rect x="211" y="430" width="90" height="8" rx="4" fill="#FF6B2B" opacity="0.3"/>
  <rect x="362" y="430" width="90" height="8" rx="4" fill="#FF6B2B" opacity="0.3"/>

  <!-- Wallet body -->
  <rect x="96" y="155" width="290" height="195" rx="22" ry="22" fill="url(#walletGrad)" filter="url(#shadow)"/>

  <!-- Wallet flap / top edge -->
  <rect x="96" y="155" width="290" height="52" rx="22" ry="22" fill="#C8D8EE"/>
  <rect x="96" y="183" width="290" height="24" fill="#C8D8EE"/>

  <!-- Wallet card lines -->
  <rect x="120" y="232" width="130" height="10" rx="5" fill="#8FA8CC" opacity="0.6"/>
  <rect x="120" y="254" width="90" height="8" rx="4" fill="#8FA8CC" opacity="0.4"/>

  <!-- Coin / dollar slot -->
  <circle cx="320" cy="255" r="32" fill="#1A2B4A" opacity="0.12"/>
  <text x="320" y="263" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#1A2B4A" text-anchor="middle" opacity="0.5">$</text>

  <!-- Truck icon (orange, overlapping bottom of wallet) -->
  <g transform="translate(130, 295)" filter="url(#shadow)">
    <!-- Truck cab -->
    <rect x="130" y="10" width="90" height="65" rx="10" ry="10" fill="url(#truckGrad)"/>
    <!-- Windshield -->
    <rect x="138" y="18" width="74" height="32" rx="6" ry="6" fill="#1A2B4A" opacity="0.7"/>
    <!-- Truck body / trailer -->
    <rect x="0" y="20" width="138" height="55" rx="8" ry="8" fill="url(#truckGrad)"/>
    <!-- Trailer door lines -->
    <line x1="68" y1="20" x2="68" y2="75" stroke="#E85A1A" stroke-width="2.5"/>
    <line x1="0" y1="47" x2="138" y2="47" stroke="#E85A1A" stroke-width="1.5" opacity="0.5"/>
    <!-- Wheels -->
    <circle cx="35" cy="80" r="18" fill="#0F1D35"/>
    <circle cx="35" cy="80" r="10" fill="#2A3F5F"/>
    <circle cx="35" cy="80" r="4" fill="#FF6B2B"/>
    <circle cx="108" cy="80" r="18" fill="#0F1D35"/>
    <circle cx="108" cy="80" r="10" fill="#2A3F5F"/>
    <circle cx="108" cy="80" r="4" fill="#FF6B2B"/>
    <circle cx="185" cy="80" r="18" fill="#0F1D35"/>
    <circle cx="185" cy="80" r="10" fill="#2A3F5F"/>
    <circle cx="185" cy="80" r="4" fill="#FF6B2B"/>
    <!-- Headlight -->
    <rect x="216" y="46" width="12" height="18" rx="3" fill="#FFD166" opacity="0.9"/>
  </g>

  <!-- Orange accent dot / speed lines -->
  <circle cx="256" cy="138" r="8" fill="#FF6B2B" opacity="0.8"/>
  <circle cx="232" cy="133" r="5" fill="#FF6B2B" opacity="0.4"/>
  <circle cx="280" cy="133" r="5" fill="#FF6B2B" opacity="0.4"/>
</svg>
