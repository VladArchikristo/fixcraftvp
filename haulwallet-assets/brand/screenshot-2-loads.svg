<svg width="390" height="844" viewBox="0 0 390 844" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1D35"/>
      <stop offset="100%" style="stop-color:#1A2B4A"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#243557"/>
      <stop offset="100%" style="stop-color:#1C2E4A"/>
    </linearGradient>
  </defs>

  <rect width="390" height="844" fill="url(#bg)"/>

  <!-- Status bar -->
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">9:41</text>

  <!-- Header -->
  <text x="20" y="74" font-family="Arial, sans-serif" font-size="14" fill="#8FA8CC">Manage your hauls</text>
  <text x="20" y="106" font-family="Arial Black, Arial, sans-serif" font-size="28" font-weight="900" fill="#FFFFFF">My Loads</text>
  <!-- + Add button -->
  <rect x="310" y="84" width="60" height="32" rx="16" fill="#FF6B2B"/>
  <text x="340" y="104" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF" text-anchor="middle">+ Add</text>

  <!-- Filter tabs -->
  <rect x="20" y="120" width="90" height="32" rx="16" fill="#FF6B2B"/>
  <text x="65" y="140" font-family="Arial, sans-serif" font-size="13" fill="#FFFFFF" text-anchor="middle">All (12)</text>
  <rect x="118" y="120" width="80" height="32" rx="16" fill="#243557"/>
  <text x="158" y="140" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC" text-anchor="middle">Active</text>
  <rect x="206" y="120" width="90" height="32" rx="16" fill="#243557"/>
  <text x="251" y="140" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC" text-anchor="middle">Completed</text>

  <!-- Load card 1 - Active -->
  <rect x="20" y="168" width="350" height="130" rx="16" fill="url(#card1)"/>
  <rect x="20" y="168" width="350" height="130" rx="16" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5"/>
  <!-- Status badge -->
  <rect x="36" y="184" width="60" height="22" rx="11" fill="#3B82F6" opacity="0.2"/>
  <text x="66" y="199" font-family="Arial, sans-serif" font-size="11" fill="#60A5FA" text-anchor="middle">● Active</text>
  <text x="36" y="234" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Charlotte → Houston</text>
  <text x="36" y="256" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC">Load #4821  •  Dry Van  •  34,000 lbs</text>
  <!-- Progress -->
  <text x="36" y="280" font-family="Arial, sans-serif" font-size="12" fill="#60A5FA">En route — 487 mi remaining</text>
  <rect x="36" y="286" width="300" height="5" rx="2.5" fill="#1A2B4A"/>
  <rect x="36" y="286" width="180" height="5" rx="2.5" fill="#3B82F6"/>
  <!-- Pay -->
  <text x="340" y="199" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FF6B2B" text-anchor="end">$890</text>

  <!-- Load card 2 - Completed -->
  <rect x="20" y="314" width="350" height="120" rx="16" fill="url(#card1)"/>
  <rect x="36" y="330" width="84" height="22" rx="11" fill="#4CAF50" opacity="0.15"/>
  <text x="78" y="345" font-family="Arial, sans-serif" font-size="11" fill="#4CAF50" text-anchor="middle">✓ Completed</text>
  <text x="36" y="378" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Memphis → Atlanta</text>
  <text x="36" y="400" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC">Load #4820  •  Reefer  •  Apr 16</text>
  <text x="340" y="345" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#4CAF50" text-anchor="end">+$640</text>
  <text x="340" y="400" font-family="Arial, sans-serif" font-size="12" fill="#8FA8CC" text-anchor="end">382 mi</text>

  <!-- Load card 3 -->
  <rect x="20" y="450" width="350" height="120" rx="16" fill="url(#card1)"/>
  <rect x="36" y="466" width="84" height="22" rx="11" fill="#4CAF50" opacity="0.15"/>
  <text x="78" y="481" font-family="Arial, sans-serif" font-size="11" fill="#4CAF50" text-anchor="middle">✓ Completed</text>
  <text x="36" y="514" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Nashville → Dallas</text>
  <text x="36" y="536" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC">Load #4819  •  Flatbed  •  Apr 14</text>
  <text x="340" y="481" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#4CAF50" text-anchor="end">+$1,020</text>
  <text x="340" y="536" font-family="Arial, sans-serif" font-size="12" fill="#8FA8CC" text-anchor="end">648 mi</text>

  <!-- Load card 4 -->
  <rect x="20" y="586" width="350" height="120" rx="16" fill="url(#card1)"/>
  <rect x="36" y="602" width="84" height="22" rx="11" fill="#4CAF50" opacity="0.15"/>
  <text x="78" y="617" font-family="Arial, sans-serif" font-size="11" fill="#4CAF50" text-anchor="middle">✓ Completed</text>
  <text x="36" y="650" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">Atlanta → Charlotte</text>
  <text x="36" y="672" font-family="Arial, sans-serif" font-size="13" fill="#8FA8CC">Load #4818  •  Dry Van  •  Apr 12</text>
  <text x="340" y="617" font-family="Arial Black, Arial, sans-serif" font-size="18" font-weight="bold" fill="#4CAF50" text-anchor="end">+$430</text>
  <text x="340" y="672" font-family="Arial, sans-serif" font-size="12" fill="#8FA8CC" text-anchor="end">248 mi</text>

  <!-- Bottom Nav -->
  <rect x="0" y="800" width="390" height="44" fill="#0A1525"/>
  <rect x="0" y="800" width="390" height="1" fill="#243557"/>
  <text x="45" y="826" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">🏠</text>
  <text x="130" y="826" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">📦</text>
  <text x="215" y="826" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">📍</text>
  <text x="300" y="826" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">💰</text>
  <text x="360" y="826" font-family="Arial, sans-serif" font-size="22" text-anchor="middle">👤</text>
  <rect x="118" y="800" width="24" height="3" rx="1.5" fill="#FF6B2B"/>
</svg>
