  <text x="72" y="596" font-family="SF Pro Display, Arial" font-size="20" fill="#8FA8C8" text-anchor="end">$1,500</text>
  <text x="72" y="656" font-family="SF Pro Display, Arial" font-size="20" fill="#8FA8C8" text-anchor="end">$1,000</text>
  <text x="72" y="716" font-family="SF Pro Display, Arial" font-size="20" fill="#8FA8C8" text-anchor="end">$500</text>
  <text x="72" y="776" font-family="SF Pro Display, Arial" font-size="20" fill="#8FA8C8" text-anchor="end">$0</text>

