  <polyline points="522,1657 540,1678 558,1657" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="516" y1="1686" x2="564" y2="1686" stroke="white" stroke-width="4" stroke-linecap="round"/>

