<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A2B4A"/>
      <stop offset="100%" stop-color="#0F1C33"/>
    </linearGradient>
    <linearGradient id="heroCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#C94E1B"/>
    </linearGradient>
    <linearGradient id="cardDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#253A5E"/>
      <stop offset="100%" stop-color="#1E2F4D"/>
    </linearGradient>
    <linearGradient id="barGrad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#C94E1B"/>
    </linearGradient>
    <linearGradient id="barGradFaded" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#C94E1B" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="barGradHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF6B35"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="heroShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#FF6B35" flood-opacity="0.3"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1080" height="1920" fill="url(#bgGrad)" rx="60" ry="60"/>

  <!-- Status Bar -->
  <rect x="0" y="0" width="1080" height="80" fill="#0F1C33" opacity="0.95"/>
  <text x="80" y="52" font-family="SF Pro Display, Arial" font-size="28" fill="white" font-weight="600">9:41</text>
  <circle cx="900" cy="40" r="7" fill="white"/>
  <circle cx="925" cy="40" r="7" fill="white"/>
  <circle cx="950" cy="40" r="7" fill="white"/>
  <path d="M975 50 Q990 35 1005 50" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M982 57 Q990 49 998 57" stroke="white" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="990" cy="62" r="4" fill="white"/>
  <rect x="1020" y="28" width="42" height="22" rx="4" stroke="white" stroke-width="2.5" fill="none"/>
  <rect x="1062" y="34" width="5" height="10" rx="2" fill="white"/>
  <rect x="1023" y="31" width="30" height="16" rx="2" fill="white"/>

  <!-- Header -->
