  <text x="90" y="548" font-family="SF Pro Display, Arial" font-size="30" fill="white" font-weight="700">This Week</text>
  <text x="600" y="548" font-family="SF Pro Display, Arial" font-size="24" fill="#8FA8C8">Apr 13 — Apr 17</text>
  <text x="990" y="548" font-family="SF Pro Display, Arial" font-size="30" fill="#FF6B35" font-weight="700" text-anchor="end">$4,240</text>

