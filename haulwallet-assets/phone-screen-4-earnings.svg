  <rect x="704" y="114" width="158" height="50" rx="25" fill="#FF6B35"/>
  <text x="783" y="145" font-family="SF Pro Display, Arial" font-size="24" fill="white" font-weight="700" text-anchor="middle">Monthly</text>
  <text x="949" y="145" font-family="SF Pro Display, Arial" font-size="24" fill="#8FA8C8" text-anchor="middle">Yearly</text>

