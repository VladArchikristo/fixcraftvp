  <text x="90" y="285" font-family="SF Pro Display, Arial" font-size="26" fill="rgba(255,255,255,0.7)" font-weight="500">APRIL 2026 — TOTAL EARNINGS</text>
  <text x="90" y="390" font-family="SF Pro Display, Arial" font-size="110" fill="white" font-weight="900">$12,480</text>
