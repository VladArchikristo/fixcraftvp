<svg xmlns="http://www.w3.org/2000/svg" width="1284" height="2778" viewBox="0 0 1284 2778">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="road" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="wallet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1284" height="2778" fill="url(#bg)"/>

  <!-- Decorative road lines -->
  <path d="M 200 2200 Q 642 1500 1084 800" stroke="url(#road)" stroke-width="80" fill="none" stroke-linecap="round" opacity="0.08"/>
  <path d="M 300 2300 Q 642 1600 984 900" stroke="url(#road)" stroke-width="4" fill="none" stroke-linecap="round" stroke-dasharray="20 15" opacity="0.15"/>

  <!-- Wallet icon -->
  <rect x="442" y="1050" width="400" height="280" rx="35" fill="url(#wallet)" opacity="0.95"/>
  <rect x="442" y="1050" width="400" height="65" rx="35" fill="#D97706"/>

  <!-- Dollar sign -->
  <text x="642" y="1260" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="160" font-weight="bold" fill="#0F172A" opacity="0.8">$</text>

  <!-- Truck silhouette -->
  <g transform="translate(480, 870) scale(0.5)">
    <rect x="280" y="80" width="150" height="120" rx="15" fill="#60A5FA"/>
    <rect x="20" y="60" width="270" height="140" rx="10" fill="#93C5FD"/>
    <circle cx="100" cy="220" r="30" fill="#334155"/>
    <circle cx="200" cy="220" r="30" fill="#334155"/>
    <circle cx="370" cy="220" r="30" fill="#334155"/>
    <circle cx="100" cy="220" r="12" fill="#64748B"/>
    <circle cx="200" cy="220" r="12" fill="#64748B"/>
    <circle cx="370" cy="220" r="12" fill="#64748B"/>
    <rect x="295" y="90" width="60" height="50" rx="8" fill="#0F172A" opacity="0.5"/>
  </g>

  <!-- App name -->
  <text x="642" y="1500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="900" fill="white" letter-spacing="6">HaulWallet</text>

  <!-- Tagline -->
  <text x="642" y="1580" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#94A3B8" letter-spacing="4">TOLL COSTS. IFTA. EXPENSES.</text>
</svg>
