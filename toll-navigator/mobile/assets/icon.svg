<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="road" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="wallet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Road/Highway lines -->
  <path d="M 200 750 Q 512 350 824 200" stroke="url(#road)" stroke-width="60" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M 200 800 Q 512 400 824 250" stroke="url(#road)" stroke-width="8" fill="none" stroke-linecap="round" stroke-dasharray="30 20" opacity="0.5"/>

  <!-- Wallet shape -->
  <rect x="262" y="340" width="500" height="350" rx="40" fill="url(#wallet)" opacity="0.95"/>
  <rect x="262" y="340" width="500" height="80" rx="40" fill="#D97706"/>

  <!-- Dollar sign inside wallet -->
  <text x="512" y="580" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="200" font-weight="bold" fill="#0F172A" opacity="0.8">$</text>

  <!-- Truck silhouette on top -->
  <g transform="translate(350, 160) scale(0.6)">
    <!-- Truck cab -->
    <rect x="280" y="80" width="150" height="120" rx="15" fill="#60A5FA"/>
    <!-- Truck body/trailer -->
    <rect x="20" y="60" width="270" height="140" rx="10" fill="#93C5FD"/>
    <!-- Wheels -->
    <circle cx="100" cy="220" r="30" fill="#334155"/>
    <circle cx="200" cy="220" r="30" fill="#334155"/>
    <circle cx="370" cy="220" r="30" fill="#334155"/>
    <circle cx="100" cy="220" r="12" fill="#64748B"/>
    <circle cx="200" cy="220" r="12" fill="#64748B"/>
    <circle cx="370" cy="220" r="12" fill="#64748B"/>
    <!-- Windshield -->
    <rect x="295" y="90" width="60" height="50" rx="8" fill="#0F172A" opacity="0.5"/>
  </g>

  <!-- HW text at bottom -->
  <text x="512" y="820" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="90" font-weight="900" fill="white" letter-spacing="8">HaulWallet</text>
</svg>
