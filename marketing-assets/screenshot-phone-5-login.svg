<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#060E18;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A1520;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#1A2E40;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#020A14;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#152535;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="roadGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1A2E40;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D1B2A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D47A1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1565C0;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#2196F3;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="logoGlow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="truckGlow">
      <feGaussianBlur stdDeviation="30" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="headlightGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9" />
      <stop offset="40%" style="stop-color:#FFDD88;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#1565C0;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Sky background -->
  <rect width="1080" height="1920" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <circle cx="120" cy="160" r="3" fill="#FFFFFF" opacity="0.8" filter="url(#starGlow)"/>
  <circle cx="280" cy="220" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="450" cy="140" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="620" cy="180" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="790" cy="130" r="3" fill="#FFFFFF" opacity="0.8" filter="url(#starGlow)"/>
  <circle cx="940" cy="200" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="80" cy="320" r="2" fill="#FFFFFF" opacity="0.4"/>
  <circle cx="350" cy="350" r="1.5" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="700" cy="280" r="2" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="1000" cy="300" r="2.5" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="200" cy="400" r="1.5" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="850" cy="380" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="540" cy="420" r="1.5" fill="#FFFFFF" opacity="0.4"/>

  <!-- Moon -->
  <circle cx="900" cy="220" r="48" fill="#2A4060" opacity="0.6"/>
  <circle cx="918" cy="208" r="42" fill="#060E18"/>
  <circle cx="900" cy="220" r="48" fill="none" stroke="#4A6A8A" stroke-width="1" opacity="0.3"/>

  <!-- Distant city skyline silhouette -->
  <rect x="0" y="820" width="1080" height="200" fill="#0A1520" opacity="0.6"/>
  <!-- Buildings -->
  <rect x="40" y="760" width="60" height="260" fill="#0A1520" opacity="0.8"/>
  <rect x="110" y="800" width="40" height="220" fill="#0A1520" opacity="0.8"/>
  <rect x="160" y="740" width="80" height="280" fill="#0D1B2A" opacity="0.8"/>
  <rect x="250" y="780" width="50" height="240" fill="#0A1520" opacity="0.8"/>
  <rect x="310" y="820" width="40" height="200" fill="#0A1520" opacity="0.8"/>
  <rect x="360" y="760" width="70" height="260" fill="#0D1B2A" opacity="0.8"/>
  <rect x="440" y="800" width="50" height="220" fill="#0A1520" opacity="0.8"/>
  <rect x="500" y="730" width="90" height="290" fill="#0D1B2A" opacity="0.8"/>
  <rect x="600" y="770" width="60" height="250" fill="#0A1520" opacity="0.8"/>
  <rect x="670" y="810" width="40" height="210" fill="#0A1520" opacity="0.8"/>
  <rect x="720" y="750" width="80" height="270" fill="#0D1B2A" opacity="0.8"/>
  <rect x="810" y="790" width="55" height="230" fill="#0A1520" opacity="0.8"/>
  <rect x="875" y="830" width="45" height="190" fill="#0A1520" opacity="0.8"/>
  <rect x="930" y="760" width="70" height="260" fill="#0D1B2A" opacity="0.8"/>
  <rect x="1010" y="800" width="70" height="220" fill="#0A1520" opacity="0.8"/>

  <!-- Building lights (tiny dots) -->
  <rect x="55" y="800" width="8" height="8" rx="1" fill="#F59E0B" opacity="0.7"/>
  <rect x="75" y="820" width="8" height="8" rx="1" fill="#FFFFFF" opacity="0.4"/>
  <rect x="185" y="790" width="8" height="8" rx="1" fill="#F59E0B" opacity="0.6"/>
  <rect x="205" y="810" width="8" height="8" rx="1" fill="#FFFFFF" opacity="0.5"/>
  <rect x="515" y="780" width="8" height="8" rx="1" fill="#F59E0B" opacity="0.7"/>
  <rect x="535" y="800" width="8" height="8" rx="1" fill="#FFFFFF" opacity="0.4"/>
  <rect x="735" y="790" width="8" height="8" rx="1" fill="#F59E0B" opacity="0.6"/>
  <rect x="945" y="800" width="8" height="8" rx="1" fill="#FFFFFF" opacity="0.5"/>

  <!-- Road/ground -->
  <rect x="0" y="980" width="1080" height="200" fill="url(#roadGrad)"/>

  <!-- Road lines (perspective) -->
  <path d="M 440 980 L 100 1180 L 0 1180" fill="none" stroke="#1A3A5C" stroke-width="3" opacity="0.6"/>
  <path d="M 640 980 L 980 1180 L 1080 1180" fill="none" stroke="#1A3A5C" stroke-width="3" opacity="0.6"/>
  <!-- Center dashes -->
  <line x1="510" y1="980" x2="480" y2="1020" stroke="#2A4060" stroke-width="4" stroke-dasharray="20,15" opacity="0.8"/>
  <line x1="540" y1="980" x2="530" y2="1050" stroke="#2A4060" stroke-width="4" opacity="0.8"/>
  <line x1="570" y1="980" x2="580" y2="1050" stroke="#2A4060" stroke-width="4" opacity="0.8"/>

  <!-- TRUCK SILHOUETTE on horizon -->
  <!-- Headlight glow -->
  <ellipse cx="380" cy="950" rx="160" ry="60" fill="url(#headlightGrad)" opacity="0.4"/>

  <!-- Truck body (dark silhouette) -->
  <!-- Trailer -->
  <rect x="100" y="870" width="520" height="110" rx="8" fill="#0A1520"/>
  <!-- Cabin -->
  <rect x="520" y="840" width="200" height="140" rx="10" fill="#0D1B2A"/>
  <!-- Cabin top curve -->
  <rect x="530" y="820" width="180" height="60" rx="20" fill="#0D1B2A"/>
  <!-- Windshield -->
  <rect x="560" y="848" width="120" height="64" rx="6" fill="#0F2030"/>
  <!-- Headlights -->
  <rect x="700" y="918" width="28" height="18" rx="4" fill="#FFF9C4" opacity="0.9"/>
  <rect x="700" y="940" width="28" height="12" rx="3" fill="#FFCC02" opacity="0.7"/>
  <!-- Wheels -->
  <circle cx="200" cy="980" r="40" fill="#060E18"/>
  <circle cx="200" cy="980" r="28" fill="#0A1520"/>
  <circle cx="200" cy="980" r="14" fill="#0D1B2A"/>
  <circle cx="400" cy="980" r="40" fill="#060E18"/>
  <circle cx="400" cy="980" r="28" fill="#0A1520"/>
  <circle cx="400" cy="980" r="14" fill="#0D1B2A"/>
  <circle cx="620" cy="980" r="38" fill="#060E18"/>
  <circle cx="620" cy="980" r="26" fill="#0A1520"/>
  <circle cx="620" cy="980" r="12" fill="#0D1B2A"/>
  <circle cx="680" cy="980" r="38" fill="#060E18"/>
  <circle cx="680" cy="980" r="26" fill="#0A1520"/>
  <circle cx="680" cy="980" r="12" fill="#0D1B2A"/>
  <!-- HaulWallet text on trailer -->
  <text x="360" y="932" font-size="28" text-anchor="middle" fill="#1565C0" font-weight="700" opacity="0.7">HAULWALLET</text>

  <!-- Horizon glow line -->
  <rect x="0" y="975" width="1080" height="6" rx="3" fill="url(#glowLine)"/>

  <!-- Dark overlay for bottom half (card area) -->
  <rect x="0" y="1100" width="1080" height="820" fill="url(#horizonGrad)"/>
  <rect x="0" y="1100" width="1080" height="820" fill="#0D1B2A" opacity="0.85"/>

  <!-- Status bar -->
  <rect x="0" y="0" width="1080" height="100" fill="#060E18" opacity="0.9"/>
  <text x="80" y="68" font-size="32" fill="#FFFFFF" font-weight="600">9:41</text>
  <rect x="940" y="38" width="66" height="30" rx="6" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <rect x="1006" y="46" width="6" height="14" rx="2" fill="#FFFFFF"/>
  <rect x="944" y="42" width="48" height="22" rx="4" fill="#4CAF50"/>
  <rect x="860" y="52" width="8" height="16" rx="2" fill="#FFFFFF"/>
  <rect x="874" y="46" width="8" height="22" rx="2" fill="#FFFFFF"/>
  <rect x="888" y="40" width="8" height="28" rx="2" fill="#FFFFFF"/>
  <path d="M816 60 Q824 52 836 52 Q848 52 856 60" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <path d="M822 68 Q830 60 836 60 Q842 60 850 68" fill="none" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round"/>
  <circle cx="836" cy="74" r="5" fill="#FFFFFF"/>

  <!-- LOGO SECTION -->
  <!-- Logo icon (truck in hexagon) -->
  <polygon points="540,200 640,256 640,368 540,424 440,368 440,256" fill="url(#logoGrad)" filter="url(#logoGlow)"/>
  <polygon points="540,200 640,256 640,368 540,424 440,368 440,256" fill="none" stroke="#2196F3" stroke-width="3" opacity="0.6"/>
  <!-- Truck icon inside -->
  <rect x="470" y="286" width="100" height="60" rx="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="530" y="270" width="60" height="76" rx="4" fill="#FFFFFF" opacity="0.9"/>
  <rect x="536" y="276" width="48" height="36" rx="3" fill="#1565C0"/>
  <circle cx="488" cy="346" r="14" fill="#1565C0"/>
  <circle cx="488" cy="346" r="8" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="564" cy="346" r="14" fill="#1565C0"/>
  <circle cx="564" cy="346" r="8" fill="#FFFFFF" opacity="0.7"/>
  <rect x="580" y="318" width="16" height="10" rx="2" fill="#FFF176"/>

  <!-- App name -->
  <text x="540" y="490" font-size="72" text-anchor="middle" fill="#FFFFFF" font-weight="900" letter-spacing="-1">HaulWallet</text>

  <!-- Tagline -->
  <text x="540" y="546" font-size="30" text-anchor="middle" fill="#60A5FA" font-weight="400">Your money, mile by mile</text>

  <!-- Trust badges -->
  <text x="540" y="610" font-size="24" text-anchor="middle" fill="#4A6A8A">⭐ 4.8 · 12,000+ drivers · 100% free</text>

  <!-- Divider -->
  <line x1="160" y1="650" x2="920" y2="650" stroke="#1A3A5C" stroke-width="1.5"/>

  <!-- SIGN IN SECTION -->
  <text x="540" y="716" font-size="36" text-anchor="middle" fill="#8BA3BC" font-weight="400">Sign in to get started</text>

  <!-- Google button -->
  <rect x="100" y="748" width="880" height="108" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <!-- Google G logo -->
  <circle cx="190" cy="802" r="32" fill="#FFFFFF"/>
  <!-- G letterform -->
  <path d="M 190 780 A 22 22 0 1 1 168 802 L 180 802 A 10 10 0 1 0 190 792 Z" fill="#4285F4"/>
  <rect x="190" y="798" width="22" height="8" rx="2" fill="#4285F4"/>
  <text x="560" y="812" font-size="34" text-anchor="middle" fill="#1A1A1A" font-weight="600">Continue with Google</text>

  <!-- Apple button -->
  <rect x="100" y="880" width="880" height="108" rx="28" fill="#1A1A1A" filter="url(#shadow)"/>
  <!-- Apple logo -->
  <text x="190" y="948" font-size="52" text-anchor="middle" fill="#FFFFFF"></text>
  <text x="560" y="944" font-size="34" text-anchor="middle" fill="#FFFFFF" font-weight="600">Continue with Apple</text>

  <!-- Divider with OR -->
  <line x1="100" y1="1038" x2="450" y2="1038" stroke="#1A3A5C" stroke-width="1.5"/>
  <text x="540" y="1046" font-size="28" text-anchor="middle" fill="#4A6A8A">or sign in with email</text>
  <line x1="630" y1="1038" x2="980" y2="1038" stroke="#1A3A5C" stroke-width="1.5"/>

  <!-- Email input -->
  <rect x="100" y="1068" width="880" height="100" rx="24" fill="#0F1E30"/>
  <rect x="100" y="1068" width="880" height="100" rx="24" fill="none" stroke="#1E3A5C" stroke-width="1.5"/>
  <text x="160" y="1124" font-size="30" fill="#4A6A8A">✉️  Email address</text>

  <!-- Password input -->
  <rect x="100" y="1186" width="880" height="100" rx="24" fill="#0F1E30"/>
  <rect x="100" y="1186" width="880" height="100" rx="24" fill="none" stroke="#1E3A5C" stroke-width="1.5"/>
  <text x="160" y="1242" font-size="30" fill="#4A6A8A">🔒  Password</text>
  <!-- Show/hide -->
  <text x="940" y="1242" font-size="26" text-anchor="end" fill="#4A6A8A">Show</text>

  <!-- Forgot password -->
  <text x="980" y="1322" font-size="26" text-anchor="end" fill="#60A5FA">Forgot password?</text>

  <!-- Sign in button -->
  <rect x="100" y="1348" width="880" height="108" rx="28" fill="url(#logoGrad)" filter="url(#shadow)"/>
  <text x="540" y="1412" font-size="36" text-anchor="middle" fill="#FFFFFF" font-weight="700">Sign In</text>

  <!-- Sign up link -->
  <text x="540" y="1500" font-size="28" text-anchor="middle" fill="#8BA3BC">Don't have an account? <tspan fill="#60A5FA" font-weight="600">Sign up free</tspan></text>

  <!-- Terms -->
  <text x="540" y="1570" font-size="22" text-anchor="middle" fill="#4A6A8A">By continuing, you agree to our Terms of Service</text>
  <text x="540" y="1600" font-size="22" text-anchor="middle" fill="#4A6A8A">and Privacy Policy</text>

  <!-- Compliance badges -->
  <text x="540" y="1660" font-size="24" text-anchor="middle" fill="#2A4060">🔐 256-bit SSL · FMCSA compliant · SOC 2 Type II</text>

  <!-- Bottom home indicator -->
  <rect x="390" y="1876" width="300" height="8" rx="4" fill="#FFFFFF" opacity="0.3"/>
</svg>
